<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE WELLSAM - 프리미엄 프라이빗 케어</title>
    
    <!-- 폰트 적용 (기존 폰트 + Noto Sans KR 추가) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+KR:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- 이식된 폼 스타일시트 -->
    <link rel="stylesheet" href="./form.css">
    
    <style>
        /* 초기화 및 기본 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000; /* 다크 테마 기반 */
            color: #fff;
            font-family: 'Noto Serif KR', serif;
            line-height: 1.5;
        }

        /* 상세페이지 컨테이너 (모바일 최적화, PC 중앙 정렬) */
        .landing-wrap {
            position: relative;
            width: 100%;
            max-width: 800px; /* PC에서는 너무 커지지 않게 제한 */
            margin: 0 auto;
            background-color: #111;
            padding-bottom: 80px; /* 하단 고정바 공간 확보 */
        }

        /* 이미지 연속 나열 영역 */
        .image-stack {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .image-stack img {
            width: 100%;
            display: block; /* 이미지 하단 여백 제거 */
            object-fit: cover;
        }

        /* 우측 플로팅 상담 풍선 (Floating Balloon) */
        .floating-balloon {
            position: fixed;
            top: 10%; /* 상단에서 10% 위치 */
            right: 20px;
            width: 76px;
            height: 76px;
            background: linear-gradient(135deg, #181818 0%, #0a0a0a 100%);
            border: 1px solid rgba(212, 175, 55, 0.5); /* 우아한 골드 테두리 */
            border-radius: 50%; /* 완전한 원형 */
            display: flex;
            flex-direction: column; /* 아이콘과 텍스트 세로 배치 */
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 9999; /* 다른 요소들 위로 확실히 띄움 */
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float-animation 3s ease-in-out infinite;
        }

        .floating-balloon:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: #d4af37;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3);
            animation-play-state: paused;
        }

        .floating-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0; /* 가로 마진 제거 */
            margin-bottom: 4px; /* 텍스트와의 세로 간격 */
            color: #d4af37;
        }

        .floating-icon svg {
            width: 22px;
            height: 22px;
            animation: pulse-icon 2s infinite;
        }

        .floating-text {
            color: #d4af37;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 500;
            font-size: 0.85rem; /* 텍스트 크기 축소 */
            letter-spacing: 0px;
            text-align: center;
            line-height: 1;
        }

        @keyframes float-animation {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse-icon {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 모바일 대응 미디어쿼리 */
        @media (max-width: 600px) {
            .floating-balloon {
                top: 10%; /* 모바일에서도 동일하게 상단에서 10% 위치 */
                right: 15px; /* 화면 밖으로 밀리지 않도록 조정 */
                width: 68px;
                height: 68px;
                border-radius: 50%;
                padding: 0;
            }
            .floating-icon {
                margin-bottom: 2px;
            }
            .floating-icon svg {
                width: 18px;
                height: 18px;
            }
            .floating-text {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="landing-wrap">
        <!-- 1~15번 이미지 순차 나열 -->
        <div class="image-stack" id="image-stack-container">
            <!-- 자바스크립트로 이미지 로드 -->
        </div>
    </div>

    <!-- 우측 플로팅 상담 풍선 (Floating Balloon) -->
    <div class="floating-balloon consultation-btn" onclick="openModal()">
        <div class="floating-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
            </svg>
        </div>
        <div class="floating-text">상담신청</div>
    </div>

    <!-- 모달 컨테이너 -->
    <div id="consultation-modal" class="cf-modal-hidden"></div>

    <!-- 폼 로직 스크립트 연결 -->
    <script type="module" src="./form.js"></script>

    <!-- 이미지 로더 스크립트 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('image-stack-container');
            let imagesHtml = '';
            // 그림1.webp ~ 그림15.webp
            for (let i = 1; i <= 15; i++) {
                // width/height 속성은 제거하거나 auto로 처리 (반응형을 위해 CSS에 위임)
                imagesHtml += `<img src="./그림${i}.webp" alt="상세페이지 이미지 ${i}" loading="${i <= 3 ? 'eager' : 'lazy'}">`;
            }
            container.innerHTML = imagesHtml;
        });
    </script>
</body>
</html>
